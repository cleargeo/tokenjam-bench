name: ci

# Always-on gate: lint + tests + an offline proof. No keys, no spend.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (consumes tokenjam exactly like an external user)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (all offline / mock)
        run: pytest -q
      - name: Honesty guard (no placeholder-priced headlines / banned overclaims)
        run: pytest -q tests/test_honesty_guard.py
      - name: Offline proof smoke (pipeline produces a valid stamped proof)
        run: python -m tjbench.ci_benchmark
